<div class="edit-about-container">
  <h2>Edit Home / About Info</h2>
  <p>Update the information displayed on the public home page.</p>

  <form (submit)="onSubmit($event)" class="about-form">
    
    <div class="form-section">
      <h3>Hero Section</h3>
      <div class="form-group">
        <label>Brand Name</label>
        <input type="text" name="brandName" [(ngModel)]="siteInfo.brandName" required class="form-control" placeholder="e.g. Ibrahim A. Hamada">
      </div>
      <div class="form-group">
        <label>Brand Description</label>
        <textarea name="brandDesc" [(ngModel)]="siteInfo.brandDesc" class="form-control" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Hero Title</label>
        <input type="text" name="heroTitle" [(ngModel)]="siteInfo.heroTitle" required class="form-control" placeholder="e.g. Full Stack Developer">
      </div>
      <div class="form-group">
        <label>Hero Description</label>
        <textarea name="heroDesc" [(ngModel)]="siteInfo.heroDesc" required class="form-control" rows="3"></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Images</h3>
      <div class="form-group">
        <label>Logo Image</label>
        <input type="file" (change)="onLogoSelected($event)" accept="image/*" class="form-control">
        @if (siteInfo.logoImage) {
          <img [src]="siteInfo.logoImage" alt="Logo Preview" class="img-preview">
        }
      </div>
      <div class="form-group">
        <label>Profile Image</label>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" class="form-control">
        @if (siteInfo.profileImage) {
          <img [src]="siteInfo.profileImage" alt="Profile Preview" class="img-preview">
        }
      </div>
    </div>

    <div class="form-section">
      <h3>About Section</h3>
      <div class="form-group">
        <label>About Title</label>
        <input type="text" name="aboutTitle" [(ngModel)]="siteInfo.aboutTitle" required class="form-control">
      </div>
      <div class="form-group">
        <label>About Description 1</label>
        <textarea name="aboutDesc1" [(ngModel)]="siteInfo.aboutDesc1" required class="form-control" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>About Description 2</label>
        <textarea name="aboutDesc2" [(ngModel)]="siteInfo.aboutDesc2" class="form-control" rows="3"></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Academic & Philosophy</h3>
      <div class="form-group">
        <label>Academic Title</label>
        <input type="text" name="academicTitle" [(ngModel)]="siteInfo.academicTitle" required class="form-control">
      </div>
      <div class="form-group">
        <label>Academic Description</label>
        <textarea name="academicDesc" [(ngModel)]="siteInfo.academicDesc" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Philosophy Title</label>
        <input type="text" name="philosophyTitle" [(ngModel)]="siteInfo.philosophyTitle" class="form-control">
      </div>
      <div class="form-group">
        <label>Philosophy Description</label>
        <textarea name="philosophyDesc" [(ngModel)]="siteInfo.philosophyDesc" class="form-control" rows="3"></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Social Links</h3>
      <div class="form-group">
        <label>GitHub URL</label>
        <input type="text" name="githubUrl" [(ngModel)]="siteInfo.githubUrl" class="form-control">
      </div>
      <div class="form-group">
        <label>LinkedIn URL</label>
        <input type="text" name="linkedinUrl" [(ngModel)]="siteInfo.linkedinUrl" class="form-control">
      </div>
    </div>

    <div class="form-section">
      <h3>Contact Section</h3>
      <div class="form-group">
        <label>Contact Title</label>
        <input type="text" name="contactTitle" [(ngModel)]="siteInfo.contactTitle" class="form-control">
      </div>
      <div class="form-group">
        <label>Contact Subtitle</label>
        <input type="text" name="contactSubtitle" [(ngModel)]="siteInfo.contactSubtitle" class="form-control">
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" name="contactEmail" [(ngModel)]="siteInfo.contactEmail" class="form-control">
      </div>
    </div>

    <div class="form-section">
      <h3>Email Provider Settings</h3>
      <div class="form-group">
        <label>Email Provider</label>
        <select name="emailProvider" [(ngModel)]="siteInfo.emailProvider" class="form-control">
          <option value="">Select Provider</option>
          <option value="emailjs">EmailJS</option>
          <option value="formspree">Formspree</option>
          <option value="web3forms">Web3Forms</option>
        </select>
      </div>
      <div class="form-group">
        <label>EmailJS Service ID</label>
        <input type="text" name="emailjsServiceId" [(ngModel)]="siteInfo.emailjsServiceId" class="form-control">
      </div>
      <div class="form-group">
        <label>EmailJS Template ID</label>
        <input type="text" name="emailjsTemplateId" [(ngModel)]="siteInfo.emailjsTemplateId" class="form-control">
      </div>
      <div class="form-group">
        <label>EmailJS Public Key</label>
        <input type="text" name="emailjsPublicKey" [(ngModel)]="siteInfo.emailjsPublicKey" class="form-control">
      </div>
      <div class="form-group">
        <label>Formspree URL</label>
        <input type="text" name="formspreeUrl" [(ngModel)]="siteInfo.formspreeUrl" class="form-control">
      </div>
      <div class="form-group">
        <label>Web3Forms Access Key</label>
        <input type="text" name="web3formsAccessKey" [(ngModel)]="siteInfo.web3formsAccessKey" class="form-control">
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
