<div class="dashboard-card">
  <h2>Messages</h2>
  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (message of messages; track message._id) {
        <tr>
          <td>{{ message.name }}</td>
          <td>{{ message.email }}</td>
          <td>{{ message.message }}</td>
          <td>{{ message.createdAt | date:'shortDate' }}</td>
          <td>
            <button class="btn-danger" (click)="deleteMessage(message._id)">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" style="text-align: center;">No messages found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
