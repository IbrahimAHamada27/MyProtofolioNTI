<section class="contact-section">
  <div class="container">
    <div class="text-center">
      <h2 class="section-title">{{ siteInfo.contactTitle }}</h2>
      <p class="section-subtitle">{{ siteInfo.contactSubtitle }}</p>
    </div>

    <div class="contact-layout">
      <div class="contact-info">
        <div class="info-card">
          <div class="icon-wrapper">
            <span class="icon">✉️</span>
          </div>
          <div>
            <h4 class="info-title">Email</h4>
            <a [href]="siteInfo.contactEmail ? 'mailto:' + siteInfo.contactEmail : null" class="info-link">{{ siteInfo.contactEmail }}</a>
          </div>
        </div>
      </div>

      <div class="contact-form-wrapper">
        <h3 class="form-title">Send me a message</h3>
        
        <form class="contact-form" (submit)="onSubmit($event)">
          <div class="form-grid">
            <input type="text" name="name" placeholder="Your Name" class="form-input" required />
            <input type="email" name="email" placeholder="Your Email" class="form-input" required />
          </div>
          <textarea name="message" placeholder="Your Message" rows="5" class="form-textarea" required></textarea>
          <button type="submit" class="btn-submit">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
