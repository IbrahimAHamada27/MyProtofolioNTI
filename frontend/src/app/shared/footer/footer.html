<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-brand">
        <span class="brand-name">{{ siteInfo.brandName }}</span>
        <p class="brand-desc">{{ siteInfo.brandDesc }}</p>
      </div>

      <div class="social-links">
        <a [href]="siteInfo.githubUrl" class="social-link" target="_blank" rel="noopener noreferrer">
          <span>GitHub</span>
        </a>
        <a [href]="siteInfo.linkedinUrl" class="social-link" target="_blank" rel="noopener noreferrer">
          <span>LinkedIn</span>
        </a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 {{ siteInfo.brandName }}. All rights reserved.</p>
    </div>
  </div>
</footer>
